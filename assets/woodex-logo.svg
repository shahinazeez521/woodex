<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" fill="none">
  <!-- W -->
  <text x="0" y="62" font-family="Arial Black, Arial, Helvetica, sans-serif" font-weight="900" font-size="58" fill="#5B3A1A" letter-spacing="-1">W</text>
  
  <!-- First O - Wood ring circle -->
  <circle cx="95" cy="42" r="24" fill="#D4942A"/>
  <circle cx="95" cy="42" r="18" fill="none" stroke="#C4841A" stroke-width="1.5"/>
  <circle cx="95" cy="42" r="13" fill="none" stroke="#B8751A" stroke-width="1.5"/>
  <circle cx="95" cy="42" r="8" fill="none" stroke="#A8651A" stroke-width="1.5"/>
  <circle cx="95" cy="42" r="4" fill="#8B5A1A"/>
  <!-- Cross lines in wood ring -->
  <line x1="95" y1="18" x2="95" y2="66" stroke="#B8751A" stroke-width="1"/>
  <line x1="71" y1="42" x2="119" y2="42" stroke="#B8751A" stroke-width="1"/>
  
  <!-- Second O - Wood ring circle -->
  <circle cx="143" cy="42" r="24" fill="#D4942A"/>
  <circle cx="143" cy="42" r="18" fill="none" stroke="#C4841A" stroke-width="1.5"/>
  <circle cx="143" cy="42" r="13" fill="none" stroke="#B8751A" stroke-width="1.5"/>
  <circle cx="143" cy="42" r="8" fill="none" stroke="#A8651A" stroke-width="1.5"/>
  <circle cx="143" cy="42" r="4" fill="#8B5A1A"/>
  <!-- Cross lines in wood ring -->
  <line x1="143" y1="18" x2="143" y2="66" stroke="#B8751A" stroke-width="1"/>
  <line x1="119" y1="42" x2="167" y2="42" stroke="#B8751A" stroke-width="1"/>
  
  <!-- DEX -->
  <text x="170" y="62" font-family="Arial Black, Arial, Helvetica, sans-serif" font-weight="900" font-size="58" fill="#5B3A1A" letter-spacing="-1">DEX</text>
  
  <!-- Tagline -->
  <text x="45" y="88" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="14" fill="#5B3A1A" letter-spacing="2">TIMBER</text>
  <rect x="120" y="78" width="2" height="14" fill="#D4942A"/>
  <text x="132" y="88" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="14" fill="#5B3A1A" letter-spacing="2">FURNITURE</text>
  <rect x="240" y="78" width="2" height="14" fill="#D4942A"/>
  <text x="252" y="88" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="14" fill="#5B3A1A" letter-spacing="2">DOORS</text>
</svg>
